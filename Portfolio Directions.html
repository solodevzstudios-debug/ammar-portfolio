<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ammar · Portfolio — 3 Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0c0e; }

  /* ============ SHARED PLACEHOLDER ============ */
  .ph { position: relative; overflow: hidden; background-color: #131316;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.045) 0 10px, rgba(255,255,255,.012) 10px 22px); }
  .ph-label { position: absolute; left: 14px; bottom: 12px; font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: .04em; color: rgba(255,255,255,.42); text-transform: uppercase; }
  .ph-tag { position:absolute; top:12px; left:14px; font-family:'Space Mono', monospace; font-size:10px;
    letter-spacing:.12em; color: rgba(255,255,255,.55); text-transform: uppercase;
    border:1px solid rgba(255,255,255,.18); padding:3px 7px; border-radius:2px; }

  /* ===================================================== */
  /* DIRECTION A — CINEMATIC (trailer / AAA)               */
  /* ===================================================== */
  .dir-a { --acc: oklch(0.72 0.2 42); --acc2: oklch(0.78 0.16 60);
    background: #07080a; color: #f3f1ee; font-family: 'Barlow', sans-serif; width: 100%; }
  .dir-a .nav { position: relative; z-index: 6; display: flex; align-items: center; justify-content: space-between;
    padding: 30px 56px; }
  .dir-a .logo { font-family: 'Anton', sans-serif; font-size: 26px; letter-spacing: .16em; }
  .dir-a .logo b { color: var(--acc); }
  .dir-a .navlinks { display: flex; gap: 36px; align-items: center; }
  .dir-a .navlinks a { color: rgba(255,255,255,.72); text-decoration: none; font-size: 14px;
    letter-spacing: .14em; text-transform: uppercase; font-weight: 600; }
  .dir-a .navlinks a.social { border: 1px solid rgba(255,255,255,.22); padding: 9px 16px; border-radius: 2px; transition: border-color .2s, color .2s; }
  .dir-a .navlinks a.social:hover { color: #fff; border-color: rgba(255,255,255,.5); }
  .dir-a .navlinks a.studio { color: var(--acc); border: 1px solid var(--acc); padding: 9px 16px; border-radius: 2px; transition: background .2s, color .2s; }
  .dir-a .navlinks a.studio:hover { background: var(--acc); color: #1a0a02; }

  .dir-a .hero { position: relative; height: 600px; margin-top: -94px; display:flex; flex-direction:column;
    justify-content:flex-end; padding: 0 56px 58px; overflow: hidden; }
  .dir-a .hero-scrim { position:absolute; inset:0; z-index:3;
    background: linear-gradient(180deg, rgba(7,8,10,.62) 0%, rgba(7,8,10,.12) 34%, rgba(7,8,10,.82) 90%, #07080a 100%); }
  .dir-a .hero-inner { position:relative; z-index:5; max-width: 760px; }
  .dir-a .hero-video { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .dir-a .hero-video iframe { position: absolute; top: 50%; left: 50%; width: 177.78vh; height: 56.25vw;
    min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); }
  .dir-a .hero-fallback { position:absolute; inset:0; background:
    radial-gradient(120% 90% at 70% 10%, rgba(255,94,43,.18), transparent 55%),
    radial-gradient(80% 80% at 20% 90%, rgba(40,30,60,.5), transparent 60%), #0a0a0d; }
  .dir-a .hero-grain { position:absolute; inset:0; z-index:2; opacity:.5;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0 2px, transparent 2px 4px); mix-blend-mode: overlay; }
  .dir-a .hero-scrim { position: absolute; inset: 0; z-index: 3;
    background: linear-gradient(180deg, rgba(7,8,10,.55) 0%, rgba(7,8,10,.1) 35%, rgba(7,8,10,.85) 92%, #07080a 100%); }
  .dir-a .hero-inner { position: relative; z-index: 5; max-width: 1000px; }
  .dir-a .eyebrow { display:inline-flex; align-items:center; gap:10px; font-family:'Space Mono',monospace;
    font-size: 14px; letter-spacing: .3em; text-transform: uppercase; color: var(--acc); margin-bottom: 18px; }
  .dir-a .eyebrow::before { content:''; width:34px; height:1px; background: var(--acc); display:inline-block; }
  .dir-a h1.title { font-family: 'Anton', sans-serif; font-size: 150px; line-height: .86; letter-spacing: .005em;
    text-transform: uppercase; margin-bottom: 26px; text-shadow: 0 8px 40px rgba(0,0,0,.6); }
  .dir-a .subline { font-size: 30px; max-width: 720px; color: #fff; line-height: 1.32; font-weight: 600; }
  .dir-a .cta-row { display: flex; gap: 16px; margin-top: 38px; }
  .dir-a .btn { font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    font-size: 17px; padding: 16px 30px; border-radius: 2px; cursor: pointer; text-decoration:none; display:inline-flex;
    align-items:center; gap:10px; }
  .dir-a .btn-fill { background: var(--acc); color: #1a0a02; }
  .dir-a .btn-ghost { background: rgba(255,255,255,.04); color:#fff; border: 1px solid rgba(255,255,255,.28); }
  .dir-a .stats { position:absolute; right:56px; bottom:56px; z-index:5; display:flex; gap:40px; text-align:right; }
  .dir-a .stat .n { font-family:'Anton',sans-serif; font-size:42px; color: var(--acc2); line-height:1; }
  .dir-a .stat .l { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color: rgba(255,255,255,.5); margin-top:8px; }

  .dir-a .work { padding: 80px 56px 90px; }
  .dir-a .work-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom: 38px;
    border-bottom: 1px solid rgba(255,255,255,.1); padding-bottom: 20px; }
  .dir-a .work-head h2 { font-family:'Anton',sans-serif; font-size: 64px; letter-spacing:.02em; text-transform:uppercase; }
  .dir-a .work-head .idx { font-family:'Space Mono',monospace; color: var(--acc); letter-spacing:.2em; font-size:14px; }
  .dir-a .work-grid { display:grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; }
  .dir-a .prod-feat { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px; }
  .dir-a .prod-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:16px; }
  .dir-a .pc { position:relative; border-radius:5px; overflow:hidden; cursor:pointer; background:#0e0e11; display:block; text-decoration:none; color:inherit; transition: filter .3s; }
  .dir-a a.pc:hover { filter: brightness(1.08); }
  .dir-a .pc.feat { height: 330px; }
  .dir-a .pc.small { height: 235px; }
  .dir-a .pc img { width:100%; height:100%; object-fit:cover; display:block;
    transition: transform .55s cubic-bezier(.2,.7,.2,1); }
  .dir-a a.pc:hover img { transform: scale(1.06); }
  .dir-a .pc .ph { width:100%; height:100%; }
  .dir-a .pc .scrim { position:absolute; inset:0;
    background: linear-gradient(0deg, rgba(7,8,10,.94) 2%, rgba(7,8,10,.22) 44%, transparent 72%); }
  .dir-a .pc .meta { position:absolute; left:0; right:0; bottom:0; padding: 22px; z-index:2; }
  .dir-a .pc .gtitle { font-family:'Anton',sans-serif; font-size:26px; text-transform:uppercase; letter-spacing:.02em; line-height:1.02; }
  .dir-a .pc.feat .gtitle { font-size:40px; }
  .dir-a .pc .gtags { font-family:'Space Mono',monospace; font-size:11px; color:var(--acc2); letter-spacing:.08em;
    text-transform:uppercase; margin-top:8px; }
  .dir-a .pc .ph-tag { z-index:2; }

  /* ===================================================== */
  /* DIRECTION B — ARCADE (neon / multicolor / playful)    */
  /* ===================================================== */
  .dir-b { --c1:#27e0c8; --c2:#ff4fd8; --c3:#c6ff3d; --c4:#ffcb3d; --c5:#7b6bff;
    background: #0a0812; color: #f4f2ff; font-family:'Space Grotesk', sans-serif; width:100%;
    background-image: radial-gradient(circle at 50% 0%, rgba(123,107,255,.18), transparent 60%); }
  .dir-b .grid-bg { position:absolute; inset:0; z-index:0;
    background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 48px 48px; mask-image: radial-gradient(circle at 50% 30%, #000 30%, transparent 75%); }
  .dir-b .nav { position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:26px 52px; }
  .dir-b .logo { font-weight:700; font-size:24px; letter-spacing:-.02em; display:flex; align-items:center; gap:10px; }
  .dir-b .logo .dot { width:14px; height:14px; border-radius:4px; background: var(--c2); box-shadow:0 0 16px var(--c2); }
  .dir-b .navlinks { display:flex; gap:8px; align-items:center; }
  .dir-b .navlinks a { color:#cfc9e6; text-decoration:none; font-size:14px; font-weight:600; padding:9px 14px; border-radius:8px; }
  .dir-b .navlinks a:hover { background: rgba(255,255,255,.06); }
  .dir-b .navlinks a.studio { background: var(--c3); color:#0a0812; box-shadow: 0 0 22px rgba(198,255,61,.4); }
  .dir-b .hero { position:relative; z-index:2; padding: 60px 52px 50px; text-align:center; }
  .dir-b .badge { display:inline-flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:12px;
    letter-spacing:.12em; text-transform:uppercase; color:var(--c1); border:1px solid rgba(39,224,200,.4);
    border-radius:999px; padding:7px 16px; margin-bottom: 30px; }
  .dir-b .badge .pulse { width:8px;height:8px;border-radius:50%;background:var(--c1); box-shadow:0 0 10px var(--c1); }
  .dir-b h1.title { font-size: 116px; line-height:.94; font-weight:700; letter-spacing:-.03em; }
  .dir-b h1.title .g1 { color: var(--c2); } .dir-b h1.title .g2 { color: var(--c1); }
  .dir-b .subline { font-size: 21px; color:#b9b2d6; max-width: 620px; margin: 26px auto 0; line-height:1.5; }
  .dir-b .cta-row { display:flex; gap:14px; justify-content:center; margin-top:34px; }
  .dir-b .btn { font-weight:700; font-size:16px; padding:15px 28px; border-radius:12px; cursor:pointer; text-decoration:none;
    display:inline-flex; align-items:center; gap:9px; }
  .dir-b .btn-fill { background:var(--c4); color:#0a0812; box-shadow:0 0 26px rgba(255,203,61,.35); }
  .dir-b .btn-ghost { background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.25); }
  .dir-b .marquee { position:relative; z-index:2; margin-top: 50px; padding: 14px 0; border-top:1px solid rgba(255,255,255,.08);
    border-bottom:1px solid rgba(255,255,255,.08); overflow:hidden; white-space:nowrap; }
  .dir-b .marquee span { font-family:'Space Mono',monospace; font-size:14px; letter-spacing:.1em; color:#8a82a8;
    text-transform:uppercase; padding:0 22px; }
  .dir-b .marquee span b { color: var(--c3); }
  .dir-b .work { position:relative; z-index:2; padding: 60px 52px 80px; }
  .dir-b .work h2 { font-size:40px; font-weight:700; letter-spacing:-.02em; margin-bottom:6px; }
  .dir-b .work p.sub { color:#8a82a8; font-family:'Space Mono',monospace; font-size:13px; letter-spacing:.05em; margin-bottom:30px; }
  .dir-b .cards { display:grid; grid-template-columns: repeat(3,1fr); gap:18px; }
  .dir-b .card { border-radius:18px; overflow:hidden; background:#120f1d; border:1px solid rgba(255,255,255,.07);
    cursor:pointer; transition: transform .2s; }
  .dir-b .card:hover { transform: translateY(-4px); }
  .dir-b .card .ph { width:100%; height:180px; }
  .dir-b .card .body { padding:18px; }
  .dir-b .card .gtitle { font-size:21px; font-weight:700; }
  .dir-b .card .chips { display:flex; gap:7px; flex-wrap:wrap; margin-top:12px; }
  .dir-b .card .chip { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    padding:5px 9px; border-radius:7px; }

  /* ===================================================== */
  /* DIRECTION C — EDITORIAL STUDIO (refined / magazine)   */
  /* ===================================================== */
  .dir-c { --acc: oklch(0.82 0.09 232); --paper:#100f0e; background: var(--paper); color: #ece9e3;
    font-family:'Manrope', sans-serif; width:100%; }
  .dir-c .nav { display:flex; align-items:center; justify-content:space-between; padding: 34px 64px;
    border-bottom: 1px solid rgba(255,255,255,.08); }
  .dir-c .logo { font-family:'Instrument Serif', serif; font-size: 30px; letter-spacing:.01em; }
  .dir-c .navlinks { display:flex; gap:34px; align-items:center; }
  .dir-c .navlinks a { color: rgba(236,233,227,.6); text-decoration:none; font-size:13px; letter-spacing:.06em;
    text-transform:uppercase; font-weight:600; }
  .dir-c .navlinks a.studio { color: var(--paper); background: var(--acc); padding:8px 15px; border-radius:1px; }
  .dir-c .hero { padding: 80px 64px 64px; display:grid; grid-template-columns: 1.4fr 1fr; gap: 56px; align-items:end; }
  .dir-c .hero .meta-num { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.2em; color:var(--acc);
    text-transform:uppercase; margin-bottom: 26px; }
  .dir-c h1.title { font-family:'Instrument Serif', serif; font-size: 104px; line-height:.94; font-weight:400; letter-spacing:-.01em; }
  .dir-c h1.title em { font-style:italic; color: var(--acc); }
  .dir-c .hero .right { padding-bottom: 12px; }
  .dir-c .hero .right p { font-size: 17px; line-height:1.7; color: rgba(236,233,227,.74); }
  .dir-c .hero .right .sig { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.1em; color:rgba(236,233,227,.45);
    text-transform:uppercase; margin-top:22px; border-top:1px solid rgba(255,255,255,.12); padding-top:18px; }
  .dir-c .filmstrip { padding: 8px 64px 26px; display:grid; grid-template-columns: repeat(4,1fr); gap:14px; }
  .dir-c .filmstrip .ph { height: 150px; border-radius:2px; }
  .dir-c .work { padding: 50px 64px 84px; }
  .dir-c .work-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 10px; }
  .dir-c .work-head h2 { font-family:'Instrument Serif',serif; font-size:46px; font-weight:400; }
  .dir-c .work-head .lbl { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.16em; color:rgba(236,233,227,.45);
    text-transform:uppercase; }
  .dir-c .rows { margin-top: 14px; }
  .dir-c .row { display:grid; grid-template-columns: 60px 1.6fr 1.4fr 120px; gap:24px; align-items:center;
    padding: 22px 6px; border-top:1px solid rgba(255,255,255,.1); cursor:pointer; transition: background .15s; }
  .dir-c .row:hover { background: rgba(255,255,255,.025); }
  .dir-c .row:last-child { border-bottom:1px solid rgba(255,255,255,.1); }
  .dir-c .row .rn { font-family:'Space Mono',monospace; color:var(--acc); font-size:14px; }
  .dir-c .row .rt { font-family:'Instrument Serif',serif; font-size: 30px; }
  .dir-c .row .rd { font-size:14px; color:rgba(236,233,227,.6); line-height:1.5; }
  .dir-c .row .ry { font-family:'Space Mono',monospace; font-size:13px; color:rgba(236,233,227,.5); text-align:right; }

  /* ---- canvas frame label helper (outside artboards) ---- */
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dir-arcade.jsx"></script>
<script type="text/babel" src="dir-editorial.jsx"></script>
<script type="text/babel">
// Cinematic direction with project URLs wired in
const HERO_VIDEO_ID = "eRsGyueVLvQ";

function ProdCard({ g, feat }) {
  const CardContent = () => (
    <>
      {g.img
        ? <img src={g.img} alt={g.t} />
        : <div className="ph"><span className="ph-label">drop {g.t} key art</span></div>}
      <div className="scrim"></div>
      <span className="ph-tag">{g.tag}</span>
      <div className="meta">
        <div className="gtitle">{g.t}</div>
        <div className="gtags">{g.tags}</div>
      </div>
    </>
  );

  return g.url ? (
    <a href={g.url} target="_blank" rel="noopener noreferrer" className={"pc " + (feat ? "feat" : "small")}>
      <CardContent />
    </a>
  ) : (
    <div className={"pc " + (feat ? "feat" : "small")}>
      <CardContent />
    </div>
  );
}

function DirCinematic() {
  const feature = [
    { t: "Bladefall", img: "media/Bladefall.webp", tags: "GAS Combat · Enemy AI · Niagara VFX", tag: "2023 — Now · Steam", url: "https://store.steampowered.com/app/3066110/Bladefall/" },
    { t: "Malediction: The Lost Villa", img: "media/Malediction.webp", tags: "Horror · Level & Systems Design", tag: "Horror", url: null },
  ];
  const grid = [
    { t: "Celestial", img: "media/Celestial.png", tags: "Sci-Fi · Worldbuilding", tag: "Published", url: "https://alter-learning.com/games/celestial/" },
    { t: "Evil Unleashed", img: "media/EvilUnleashed.jpg", tags: "Horror · Mobile · 3D Art", tag: "Itch.io", url: "https://solodevz.itch.io/evil-unleashed" },
    { t: "Abandoned Desert", img: "media/AbandonedDesert.jpg", tags: "Level Design · Environment Art", tag: "Level Design", url: "https://www.artstation.com/artwork/3qaEzD" },
    { t: "Alien Cosmos", img: "media/AlienCosmos.webp", tags: "Sci-Fi · Multiplayer · Metaverse", tag: "Metaverse", url: "https://www.artstation.com/artwork/gRQ4gZ" },
    { t: "Billion Year War", img: "media/BillionYearWar.jpg", tags: "Survival · Multiplayer", tag: "Itch.io", url: "https://solodevz.itch.io/billion-year-war" },
    { t: "Blair Witch", img: "media/BlairWitch.jpg", tags: "Folklore Horror · Prototype", tag: "ArtStation", url: "https://www.artstation.com/artwork/klzLn6" },
  ];
  return (
    <div className="dir-a">
      <nav className="nav">
        <div className="logo">AMM<b>AR</b></div>
        <div className="navlinks">
          <a href="#">Work</a>
          <a href="#">About</a>
          <a href="#">Services</a>
          <a href="#">Contact</a>
          <a className="social" href="https://www.linkedin.com/in/muhammad-ammar-687471201/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <a className="social" href="https://www.upwork.com/freelancers/~0144f64bdd5e07f709?mp_source=share" target="_blank" rel="noopener noreferrer">Upwork</a>
          <a className="studio" href="https://midnightghoulgames.com/" target="_blank" rel="noopener noreferrer">The Studio →</a>
        </div>
      </nav>

      <header className="hero">
        <div className="hero-fallback"></div>
        <div className="hero-video">
          <iframe
            src={`https://www.youtube.com/embed/${HERO_VIDEO_ID}?autoplay=1&mute=1&loop=1&playlist=${HERO_VIDEO_ID}&controls=0&showinfo=0&modestbranding=1&playsinline=1&rel=0&disablekb=1`}
            title="hero" frameBorder="0" allow="autoplay; encrypted-media" allowFullScreen></iframe>
        </div>
        <div className="hero-grain"></div>
        <div className="hero-scrim"></div>
        <div className="hero-inner">
          <div className="eyebrow">Unreal Engine Game Developer</div>
          <p className="subline">I build cinematic combat, smart enemy AI and immersive worlds in Unreal Engine — from first prototype to shipped game.</p>
        </div>
        <div className="stats">
          <div className="stat"><div className="n">8</div><div className="l">Projects</div></div>
          <div className="stat"><div className="n">8+</div><div className="l">Yrs Since 2017</div></div>
          <div className="stat"><div className="n">UE5</div><div className="l">+ C++ / GAS</div></div>
        </div>
      </header>

      <section className="work">
        <div className="work-head">
          <h2>Products Worked On</h2>
          <div className="idx">01 — 08</div>
        </div>
        <div className="prod-feat">
          {feature.map((g, i) => <ProdCard key={i} g={g} feat={true} />)}
        </div>
        <div className="prod-grid">
          {grid.map((g, i) => <ProdCard key={i} g={g} feat={false} />)}
        </div>
      </section>
    </div>
  );
}
window.DirCinematic = DirCinematic;

const { DesignCanvas, DCSection, DCArtboard } = window;
function App() {
  return (
    <DesignCanvas>
      <DCSection id="home" title="Homepage — 3 Directions" subtitle="Dark · cinematic · game-dev. Pick one (or mix) and I'll build out the full multi-page site.">
        <DCArtboard id="a" label="A · Cinematic — trailer bg video" width={1440} height={1760}>
          <window.DirCinematic />
        </DCArtboard>
        <DCArtboard id="b" label="B · Arcade — neon multicolor" width={1440} height={1560}>
          <window.DirArcade />
        </DCArtboard>
        <DCArtboard id="c" label="C · Editorial Studio — refined" width={1440} height={1180}>
          <window.DirEditorial />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
