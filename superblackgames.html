document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, transparent 2px 4px); }\n  .hero-inner { position: relative; z-index: 5; max-width: 1120px; }\n  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace;\n    font-size: 14px; letter-spacing: .3em; text-transform: uppercase; color: var(--acc); margin-bottom: 26px; }\n  .eyebrow::before { content: ''; width: 34px; height: 1px; background: var(--acc); }\n  .eyebrow .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--acc); box-shadow: 0 0 10px var(--acc); animation: pulse 2s infinite; }\n  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }\n  h1.head { font-family: 'Anton', sans-serif; font-size: clamp(48px, 7vw, 116px); line-height: .92; letter-spacing: .005em; text-transform: uppercase; }\n  h1.head .o { color: var(--acc); }\n  .lead { font-size: clamp(18px, 2vw, 25px); color: rgba(255,255,255,.74); max-width: 780px; margin-top: 28px; line-height: 1.5; }\n  .lead b { color: var(--acc2); font-weight: 600; }\n  .hbtns { display: flex; gap: 14px; margin-top: 40px; flex-wrap: wrap; }\n  .btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;\n    font-size: 17px; padding: 16px 30px; border-radius: 3px; text-decoration: none; display: inline-flex; align-items: center;\n    gap: 10px; transition: transform .2s, box-shadow .2s, border-color .2s, background .2s; }\n  .btn.fill { background: var(--acc); color: #1a0a02; }\n  .btn.fill:hover { box-shadow: 0 0 28px rgba(255,94,43,.45); transform: translateY(-2px); }\n  .btn.ghost { border: 1px solid rgba(255,255,255,.28); color: #fff; }\n  .btn.ghost:hover { border-color: #fff; transform: translateY(-2px); }\n  .scroll-cue { position: absolute; left: 56px; bottom: 30px; z-index: 5; font-family: 'Space Mono', monospace;\n    font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.45);\n    display: flex; align-items: center; gap: 10px; }\n  .scroll-cue .bar { width: 1px; height: 26px; background: linear-gradient(var(--acc), transparent); animation: drop 1.8s infinite; }\n  @keyframes drop { 0% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } 100% { transform: scaleY(0); transform-origin: bottom; } }\n\n  /* sections */\n  section { position: relative; z-index: 5; }\n  .wrap { max-width: 1640px; margin: 0 auto; padding: 96px 56px; }\n  .sec-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 40px;\n    border-bottom: 1px solid rgba(255,255,255,.1); padding-bottom: 22px; gap: 20px; flex-wrap: wrap; }\n  .sec-head h2 { font-family: 'Anton', sans-serif; font-size: clamp(38px, 5vw, 66px); letter-spacing: .02em; text-transform: uppercase; line-height: .92; }\n  .sec-head .idx { font-family: 'Space Mono', monospace; color: var(--acc); letter-spacing: .2em; font-size: 14px; white-space: nowrap; }\n  .sec-head .sub { font-family: 'Space Mono', monospace; color: rgba(255,255,255,.5); font-size: 13px; letter-spacing: .06em; max-width: 400px; }\n\n  .reveal { opacity: 0; transform: translateY(28px); transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }\n  .reveal.in { opacity: 1; transform: none; }\n\n  /* about the game */\n  .game-info { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n  .gi { border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 34px 32px; background: rgba(255,255,255,.015);\n    transition: border-color .25s, transform .25s, background .25s; }\n  .gi:hover { border-color: rgba(255,94,43,.5); transform: translateY(-4px); background: rgba(255,94,43,.04); }\n  .gi .no { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--acc); letter-spacing: .2em; }\n  .gi h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; font-size: 26px; margin: 14px 0 10px; }\n  .gi p { color: rgba(255,255,255,.6); font-size: 15.5px; line-height: 1.55; }\n\n  /* team cards */\n  .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\n  .pc { position: relative; border-radius: 6px; overflow: hidden; background: #0e0e11; display: block; text-decoration: none;\n    color: inherit; transition: transform .25s ease, box-shadow .35s ease; will-change: transform; height: 360px; }\n  .pc:hover { box-shadow: 0 24px 60px -20px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.06); }\n  .pc-inner { position: absolute; inset: 0; }\n  .pc .mono { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;\n    font-family: 'Anton', sans-serif; font-size: 92px; color: rgba(255,255,255,.9); z-index: 0;\n    background: linear-gradient(150deg, var(--c1, #2a2030), var(--c2, #15131c)); letter-spacing: .04em; }\n  .pc img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;\n    transition: transform .6s cubic-bezier(.2,.7,.2,1); }\n  .pc:hover img { transform: scale(1.06); }\n  .pc .scrim { position: absolute; inset: 0; z-index: 2;\n    background: linear-gradient(0deg, rgba(7,8,10,.95) 2%, rgba(7,8,10,.25) 48%, transparent 74%); }\n  .pc .ph-tag { position: absolute; top: 14px; left: 14px; z-index: 3; font-family: 'Space Mono', monospace; font-size: 10px;\n    letter-spacing: .12em; color: rgba(255,255,255,.7); text-transform: uppercase; border: 1px solid rgba(255,255,255,.22);\n    padding: 4px 8px; border-radius: 2px; background: rgba(5,6,8,.4); }\n  .pc .meta { position: absolute; left: 0; right: 0; bottom: 0; z-index: 4; padding: 24px; }\n  .pc .gtitle { font-family: 'Anton', sans-serif; font-size: 28px; text-transform: uppercase; letter-spacing: .02em; line-height: 1.02; }\n  .pc .gtags { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--acc2); letter-spacing: .08em; text-transform: uppercase; margin-top: 9px; }\n  .pc .view { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; font-family: 'Barlow Condensed', sans-serif;\n    font-weight: 700; letter-spacing: .12em; text-transform: uppercase; font-size: 13px; color: #fff; opacity: 0; transform: translateY(8px);\n    transition: opacity .3s, transform .3s; }\n  .pc .view .arr { display: inline-flex; width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--acc);\n    align-items: center; justify-content: center; color: var(--acc); font-size: 12px; }\n  .pc:hover .view { opacity: 1; transform: none; }\n\n  /* contact */\n  .contact-band { max-width: 1640px; margin: 0 auto; padding: 40px 56px 0; }\n  .contact-card { border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 66px 56px;\n    background: radial-gradient(130% 180% at 100% 0%, rgba(255,94,43,.14), transparent 56%), rgba(255,255,255,.02);\n    display: flex; align-items: center; justify-content: space-between; gap: 36px; flex-wrap: wrap; }\n  .contact-card h3 { font-family: 'Anton', sans-serif; font-size: clamp(32px, 4.2vw, 56px); text-transform: uppercase; line-height: .96; }\n  .contact-card p { color: rgba(255,255,255,.62); font-size: 17px; margin-top: 14px; max-width: 460px; line-height: 1.55; }\n\n  footer { position: relative; z-index: 5; max-width: 1640px; margin: 80px auto 0; padding: 40px 56px 60px;\n    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; border-top: 1px solid rgba(255,255,255,.08); }\n  footer .fn { font-family: 'Anton', sans-serif; letter-spacing: .14em; font-size: 20px; }\n  footer .fc { font-family: 'Space Mono', monospace; font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: .05em; }\n\n  @media (max-width: 1100px) {\n    .nav, .nav.scrolled { padding: 16px 22px; } .navlinks { gap: 14px; } .navlinks a.link { display: none; }\n    .wrap, .contact-band { padding-left: 22px; padding-right: 22px; } .hero { padding: 110px 22px 56px; }\n    .game-info, .team-grid { grid-template-columns: 1fr; }\n    .scroll-cue { display: none; }\n  }\n  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1 !important; transform: none !important; } .pulse, .bar { animation: none !important; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"spot\" id=\"spot\"><\u002Fdiv>\n\n  <nav class=\"nav\" id=\"nav\">\n    <a class=\"logo\" href=\"#top\">SUPER<b>BLACK<\u002Fb><\u002Fa>\n    <div class=\"navlinks\">\n      <a class=\"link\" href=\"#game\">The Game<\u002Fa>\n      <a class=\"link\" href=\"#team\">Team<\u002Fa>\n      <a class=\"link\" href=\"#contact\">Contact<\u002Fa>\n      <a class=\"cta\" href=\"mailto:ammarmuhammad687@gmail.com\">Follow Development →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <header class=\"hero\" id=\"top\">\n    <div class=\"hero-bg\"><\u002Fdiv>\n    <div class=\"hero-inner\">\n      <div class=\"eyebrow\"><span class=\"pulse\"><\u002Fspan>Super Black Games<\u002Fdiv>\n      <h1 class=\"head\">Stealth.<br><span class=\"o\">Strategy.<\u002Fspan><br>Conquest.<\u002Fh1>\n      <p class=\"lead\">We're building a <b>stealth-driven, open-world strategy game<\u002Fb> — command armies, infiltrate strongholds and conquer kingdoms in a world where tactics beat brute force. Inspired by the scale of <b>Mount &amp; Blade II: Bannerlord<\u002Fb>, built from the ground up with a focus on covert operations and battlefield cunning.<\u002Fp>\n      <div class=\"hbtns\">\n        <a class=\"btn fill\" href=\"#game\">Explore the Game →<\u002Fa>\n        <a class=\"btn ghost\" href=\"#team\">Meet the Team<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"scroll-cue\"><span class=\"bar\"><\u002Fspan>Scroll to explore<\u002Fdiv>\n  <\u002Fheader>\n\n  <section id=\"game\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <h2>About the Game<\u002Fh2>\n        <div class=\"sub\">An open-world stealth strategy experience where every battle can be won before it begins.<\u002Fdiv>\n        <div class=\"idx\">IN DEVELOPMENT<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"game-info\" id=\"gameInfo\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"team\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <h2>The Team<\u002Fh2>\n        <div class=\"sub\">A small, focused crew building something ambitious.<\u002Fdiv>\n        <div class=\"idx\">PEOPLE<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"team-grid\" id=\"teamGrid\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"contact-band\" id=\"contact\">\n    <div class=\"contact-card reveal\">\n      <div>\n        <h3>Stay in<br>the loop.<\u002Fh3>\n        <p>Follow our development journey — sign up for updates, devlogs and early access announcements.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"hbtns\">\n        <a class=\"btn fill\" href=\"mailto:ammarmuhammad687@gmail.com?subject=Super%20Black%20Games%20—%20Updates\">Get Updates →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <div class=\"fn\">SUPER BLACK GAMES<\u002Fdiv>\n    <div class=\"fc\">STEALTH · STRATEGY · OPEN WORLD &nbsp;·&nbsp; IN DEVELOPMENT<\u002Fdiv>\n  <\u002Ffooter>\n\n  <script>\n    const GAME_FEATURES = [\n      { t: \"Stealth-First Combat\", d: \"Infiltrate enemy camps, assassinate commanders and sabotage supply lines before the battle even starts. Every encounter can be approached from the shadows.\" },\n      { t: \"Open-World Kingdom Map\", d: \"Ride across a sprawling medieval world — claim territories, build outposts and forge alliances. The map reacts to your conquests in real time.\" },\n      { t: \"Army Command & Tactics\", d: \"Recruit and train diverse units. Lead them into large-scale field battles where formations, terrain and morale shift the outcome — not just numbers.\" },\n      { t: \"Deep Progression\", d: \"Level your character across stealth, diplomacy and warfare skill trees. Your playstyle shapes the story — be a shadow ruler or a frontline warlord.\" },\n    ];\n\n    const TEAM = [\n      { name: \"Wajahat Mughal\", role: \"Founder\", tag: \"Founder\", skills: \"\", photo: \"media/team/wajahat.jpg\", c1: \"#2e1a12\", c2: \"#120e0a\", url: \"#\" },\n      { name: \"Bilal\", role: \"3D Designer · Technical Artist · Level Designer\", tag: \"Art / Design\", skills: \"3D · Level Design · Tech Art\", photo: \"media/team/bilal.jpg\", c1: \"#1a2636\", c2: \"#0e1018\", url: \"#\" },\n      { name: \"Usman Hashmi\", role: \"3D Designer · Technical Artist · Level Designer\", tag: \"Art / Design\", skills: \"3D · Level Design · Tech Art\", photo: \"media/team/usman.jpg\", c1: \"#16302a\", c2: \"#0f1815\", url: \"#\" },\n      { name: \"Muhammad Ammar\", role: \"Developer\", tag: \"Dev\", skills: \"Gameplay · Systems · AI\", photo: \"media/team/ammar.jpg\", c1: \"#3a2118\", c2: \"#15110e\", url: \"Ammar Portfolio.html\" },\n    ];\n\n    // game features\n    document.getElementById('gameInfo').innerHTML = GAME_FEATURES.map((f, i) => `\n      <div class=\"gi reveal\">\n        <div class=\"no\">${String(i + 1).padStart(2, '0')}<\u002Fdiv>\n        <h3>${f.t}<\u002Fh3>\n        <p>${f.d}<\u002Fp>\n      <\u002Fdiv>`).join('');\n\n    // team\n    const teamGrid = document.getElementById('teamGrid');\n    TEAM.forEach(m => {\n      const initials = m.name.split(' ').map(w => w[0]).slice(0, 2).join('');\n      const el = document.createElement(m.url && m.url !== '#' ? 'a' : 'div');\n      el.className = 'pc reveal';\n      if (m.url && m.url !== '#') { el.href = m.url; }\n      el.innerHTML = `\n        <div class=\"pc-inner\">\n          <div class=\"mono\" style=\"--c1:${m.c1};--c2:${m.c2}\">${initials}<\u002Fdiv>\n          <img src=\"${m.photo}\" alt=\"${m.name}\" loading=\"lazy\" onerror=\"this.style.display='none'\" />\n          <div class=\"scrim\"><\u002Fdiv>\n          <span class=\"ph-tag\">${m.tag}<\u002Fspan>\n          <div class=\"meta\">\n            <div class=\"gtitle\">${m.name}<\u002Fdiv>\n            <div class=\"gtags\">${m.role}${m.skills ? ' · ' + m.skills : ''}<\u002Fdiv>\n            ${m.url && m.url !== '#' ? '<span class=\"view\">View Portfolio <span class=\"arr\">→<\u002Fspan><\u002Fspan>' : ''}\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n      teamGrid.appendChild(el);\n    });\n\n    // reveal\n    const io = new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } }), { threshold: 0.12 });\n    document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n    // nav scroll\n    const nav = document.getElementById('nav');\n    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40), { passive: true });\n\n    // spotlight\n    const spot = document.getElementById('spot');\n    let sx = innerWidth / 2, sy = innerHeight * .3, tx = sx, ty = sy;\n    window.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; }, { passive: true });\n    (function loop() { sx += (tx - sx) * .12; sy += (ty - sy) * .12; spot.style.left = sx + 'px'; spot.style.top = sy + 'px'; requestAnimationFrame(loop); })();\n\n    // tilt on team cards\n    document.querySelectorAll('.team-grid .pc').forEach(pc => {\n      pc.addEventListener('mousemove', e => {\n        const r = pc.getBoundingClientRect();\n        const px = (e.clientX - r.left) / r.width - .5, py = (e.clientY - r.top) / r.height - .5;\n        pc.style.transform = `perspective(900px) rotateY(${px * 6}deg) rotateX(${-py * 6}deg)`;\n      });\n      pc.addEventListener('mouseleave', () => { pc.style.transform = ''; });\n    });\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
